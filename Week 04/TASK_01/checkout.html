<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopDark — Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">ShopDark</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html" class="cart-link">
        Cart
        <span class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <main>
    <div class="page-header container">
      <h1>Checkout</h1>
    </div>

    <div id="checkout-form-wrap" class="checkout-layout container">
      <div>
        <form id="checkout-form" novalidate>
          <!-- Shipping -->
          <div class="checkout-section">
            <h2>Shipping Information</h2>
            <div class="form-group">
              <label for="full-name">Full Name</label>
              <input type="text" id="full-name" placeholder="John Doe">
              <span class="field-error" id="full-name-error"></span>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="john@example.com">
              <span class="field-error" id="email-error"></span>
            </div>
            <div class="form-group">
              <label for="address">Street Address</label>
              <input type="text" id="address" placeholder="123 Main St">
              <span class="field-error" id="address-error"></span>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" placeholder="Karachi">
                <span class="field-error" id="city-error"></span>
              </div>
              <div class="form-group">
                <label for="zip">ZIP / Postal Code</label>
                <input type="text" id="zip" placeholder="75500">
                <span class="field-error" id="zip-error"></span>
              </div>
            </div>
          </div>

          <!-- Payment -->
          <div class="checkout-section">
            <h2>Payment Details</h2>
            <div class="form-group">
              <label for="card-number">Card Number</label>
              <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19">
              <span class="field-error" id="card-number-error"></span>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="expiry">Expiry (MM/YY)</label>
                <input type="text" id="expiry" placeholder="08/27" maxlength="5">
                <span class="field-error" id="expiry-error"></span>
              </div>
              <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" placeholder="123" maxlength="4">
                <span class="field-error" id="cvv-error"></span>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-primary place-order-btn">Place Order</button>
        </form>
      </div>

      <div>
        <div id="checkout-summary">
          <h3>Order Summary</h3>
          <p style="color:var(--muted); font-size:0.85rem;">No items in cart.</p>
        </div>
      </div>
    </div>

    <!-- Success -->
    <div id="order-success">
      <div class="success-icon">✅</div>
      <h2>Order Placed!</h2>
      <p>Thanks for your purchase. A confirmation has been sent to your email.</p>
      <a href="index.html" class="btn-primary">Back to Home</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 ShopDark. All rights reserved.</p>
  </footer>

  <script src="products.js"></script>
  <script src="script.js"></script>
</body>
</html>
