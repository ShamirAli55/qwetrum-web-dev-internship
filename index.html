<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shamir Ali — Web Dev Internship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    h1 span { color: #e8c547; }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover { border-color: #e8c547; transform: translateY(-2px); }

    .week-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #e8c547;
      margin-bottom: 0.5rem;
    }

    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .card p { font-size: 0.8rem; color: #888; }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>

  <h1>Shamir <span>Ali</span></h1>
  <p class="subtitle">Qwetrum Web Development Internship</p>

  <div class="grid">
    <a href="Week 01/TASK_01/index.html" class="card">
      <div class="week-label">Week 01</div>
      <h2>HTML Basics</h2>
      <p>Task 1</p>
    </a>
    <a href="Week 02/TASK_01/index.html" class="card">
      <div class="week-label">Week 02</div>
      <h2>CSS & Bootstrap</h2>
      <p>Task 1</p>
    </a>
    <a href="Week 03/TASK_01/index.html" class="card">
      <div class="week-label">Week 03</div>
      <h2>ShopDark</h2>
      <p>E-Commerce Site</p>
    </a>
    <a href="Week 04/TASK_01/index.html" class="card">
      <div class="week-label">Week 04</div>
      <h2>Capstone</h2>
      <p>Task 1</p>
    </a>
  </div>

  <footer>github.com/ShamirAli55/qwetrum-web-dev-internship</footer>

</body>
</html>
